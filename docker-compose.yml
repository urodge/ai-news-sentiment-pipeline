version: "3.8"

services:

  # ── PostgreSQL Database ─────────────────────────────────────
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: news_pipeline
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Airflow ──────────────────────────────────────────
  airflow:
    image: apache/airflow:2.7.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pipeline_user:secret123@postgres/news_pipeline
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      NEWS_API_KEY: ${NEWS_API_KEY}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipeline:/opt/airflow/pipeline
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"          # Airflow UI → http://localhost:8080
    command: >
      bash -c "airflow db init &&
               airflow users create --username airflow --password airflow
                 --firstname Air --lastname Flow --role Admin --email admin@example.com &&
               airflow webserver & airflow scheduler"

  # ── FastAPI REST Endpoint ───────────────────────────────────
  api:
    build: .
    depends_on: [postgres]
    environment:
      DB_PATH: /data/news.db
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"          # API → http://localhost:8000/docs
    command: uvicorn api.api:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  airflow_logs:
